spring:
  profiles:
    # Activates the inquisitor-demo-db-starter's Postgres Testcontainer.
    active: unitTest
  ai:
    openai:
      # Local OpenAI-compatible server (e.g. llama.cpp); the client appends /v1.
      # Override per-environment via INQUISITOR_RUN_* (harness-specific, wins) or
      # the standard OPENAI_* env vars (shared with other tooling).
      base-url: ${INQUISITOR_RUN_BASE_URL:${OPENAI_BASE_URL:http://127.0.0.1:8000}}
      api-key: ${OPENAI_API_KEY:llama}
      chat:
        # Flattened properties; the nested chat.options.* form is deprecated
        # for removal in Spring AI 2.0.0.
        model: ${INQUISITOR_RUN_MODEL:${OPENAI_MODEL:gemma-4-31B-it-QAT-Q4_0}}
  # Force ANSI colour: the forked Gradle test JVM's stdout is piped (not a TTY),
  # so the default DETECT mode would otherwise render the logs uncoloured.
  output:
    ansi:
      enabled: always

inquisitor:
  harness:
    evaluation:
      # Optional step evaluation (LLM-as-judge). Off by default; opt in with
      # INQUISITOR_EVAL=true to score each verdict against the real tool trace.
      enabled: ${INQUISITOR_EVAL:false}
      # A genuinely separate judge on its own local server (the strong config — a
      # different model/family from the actor, not a self-judge). The api-key falls
      # back to spring.ai.openai.api-key when unset.
      base-url: ${INQUISITOR_EVAL_BASE_URL:http://127.0.0.1:8001}
      model: ${INQUISITOR_EVAL_MODEL:Qwen3.6-35B-A3B-Q8_0}

logging:
  level:
    # Trace each harness tool call (inputs and outputs) during scenario runs.
    io.inquisitor.harness.tool: DEBUG
